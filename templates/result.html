<!DOCTYPE html>
<html>
<head>
    <title>Vehicle Detection Result</title>

    <link rel="stylesheet"
    href="{{ url_for('static',
    filename='css/style.css') }}">
</head>

<body>

<div class="result-box">

    <h2>Vehicle Detection Result</h2>

    <img
        src="{{ image_path }}"
        alt="Vehicle Image"
        class="vehicle-image">

    <div class="result-item">
        Vehicle Number:
        <span>{{ vehicle_number }}</span>
    </div>

    <div class="result-item">
        Vehicle Type:
        <span>{{ vehicle_type }}</span>
    </div>

    <div class="result-item">
        Color:
        <span>{{ color }}</span>
    </div>

    <br>

    <a href="/upload">
        <button>
            Analyze Another Vehicle
        </button>
    </a>

</div>

</body>
</html>
